<!DOCTYPE html>
<html>
<head>
<title>CAPTCHA Verification</title>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

img{
border:2px solid black;
margin:20px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
}

</style>

</head>

<body>

<h2>CAPTCHA Verification</h2>

<img src="{{ url_for('static', filename='captcha.png') }}">

<form method="POST">

<input type="text" name="captcha" placeholder="Enter CAPTCHA" required>

<br><br>

<button type="submit">Submit</button>

</form>

<h3>{{message}}</h3>

</body>
</html>
